name: On-Demand Smoke Test

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to test'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
        default: 'all'

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            platform: windows
          - os: ubuntu-latest
            rid: linux-x64
            platform: linux
          - os: macos-latest
            rid: osx-x64
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check if platform should run
        id: check
        shell: bash
        run: |
          if [[ "${{ inputs.platforms }}" != "all" && "${{ inputs.platforms }}" != "${{ matrix.platform }}" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-dotnet@v4
        if: steps.check.outputs.skip != 'true'
        with:
          dotnet-version: '10.0.x'

      # macOS: Build native library
      - name: Build Native Library (macOS)
        if: steps.check.outputs.skip != 'true' && matrix.os == 'macos-latest'
        run: make universal
        working-directory: src/Hermes.Native.macOS

      # Linux: Install dependencies and build native library
      - name: Install Linux Dependencies
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev cmake

      - name: Build Native Library (Linux)
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest'
        run: ./build.sh
        working-directory: src/Hermes.Native.Linux

      - name: Restore
        if: steps.check.outputs.skip != 'true'
        run: dotnet restore

      - name: Build Sample App
        if: steps.check.outputs.skip != 'true'
        run: dotnet build samples/BlazorHelloWorld -c Release --no-restore

      - name: Run Smoke Test
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/smoke-test
        with:
          app_path: samples/BlazorHelloWorld/bin/Release/net10.0/${{ runner.os == 'Windows' && 'BlazorHelloWorld.exe' || 'BlazorHelloWorld' }}

      - name: Skipped
        if: steps.check.outputs.skip == 'true'
        run: echo "Skipping ${{ matrix.platform }} - not selected"
