name: Build and Publish NuGet

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_preview:
        description: 'Publish preview package to NuGet'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # macOS: Build native library
      - name: Build Native Library
        if: matrix.os == 'macos-latest'
        run: make universal
        working-directory: src/Hermes.Native.macOS

      # All platforms: Build and test
      - name: Restore
        run: dotnet restore
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      # macOS only: Upload native binary
      - name: Upload Native Binary
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: native-osx
          path: src/Hermes.Native.macOS/lib/libHermes.Native.macOS.dylib

  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # macOS: Build native library
      - name: Build Native Library
        if: matrix.os == 'macos-latest'
        run: make universal
        working-directory: src/Hermes.Native.macOS

      - name: Restore
        run: dotnet restore
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Sample App
        run: dotnet build samples/BlazorHelloWorld -c Release --no-restore

      - name: Run Smoke Test
        uses: ./.github/actions/smoke-test
        with:
          app_path: samples/BlazorHelloWorld/bin/Release/net10.0/${{ runner.os == 'Windows' && 'BlazorHelloWorld.exe' || 'BlazorHelloWorld' }}

  pack-and-publish:
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_preview == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Native Binary
        uses: actions/download-artifact@v4
        with:
          name: native-osx
          path: artifacts/native

      - name: Restore
        run: dotnet restore
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-preview.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Pack Hermes
        run: |
          dotnet pack src/Hermes/Hermes.csproj \
            -c Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:IsPackaging=true \
            -p:NativeBinaryPath=${{ github.workspace }}/artifacts/native \
            -o packages

      - name: Pack Hermes.Blazor
        run: |
          dotnet pack src/Hermes.Blazor/Hermes.Blazor.csproj \
            -c Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o packages

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: packages/*.nupkg

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push packages/*.nupkg \
            --api-key ${{ secrets.NUGET_ORG_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github https://nuget.pkg.github.com/mythetech/index.json
          dotnet nuget push packages/*.nupkg --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
