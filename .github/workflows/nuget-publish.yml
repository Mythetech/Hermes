name: Build and Publish NuGet

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_preview:
        description: 'Publish preview package to NuGet'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # macOS: Build native library
      - name: Build Native Library (macOS)
        if: matrix.os == 'macos-latest'
        run: make universal
        working-directory: src/Hermes.Native.macOS

      # Linux: Install dependencies and build native library
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev cmake

      - name: Build Native Library (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ./build.sh
        working-directory: src/Hermes.Native.Linux

      # All platforms: Build and test
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      # All platforms: Upload compiled DLL and PDB for multi-RID packaging
      - name: Upload Platform Binaries
        uses: actions/upload-artifact@v4
        with:
          name: dll-${{ matrix.rid }}
          path: |
            src/Hermes/bin/Release/net10.0/Hermes.dll
            src/Hermes/bin/Release/net10.0/Hermes.pdb
          retention-days: 14

      # Windows only: Upload WebView2 managed SDK (needed at runtime, doesn't flow transitively via NuGet)
      - name: Upload WebView2 Binaries
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: webview2-win-x64
          path: |
            src/Hermes/bin/Release/net10.0/Microsoft.Web.WebView2.Core.dll
            src/Hermes/bin/Release/net10.0/runtimes/win-x64/native/WebView2Loader.dll
          retention-days: 14

      # macOS only: Upload native binary
      - name: Upload Native Binary (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: native-osx
          path: src/Hermes.Native.macOS/lib/libHermes.Native.macOS.dylib
          retention-days: 14

      # Linux only: Upload native binary
      - name: Upload Native Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: src/Hermes.Native.Linux/lib/libHermes.Native.Linux.so
          retention-days: 14

  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # macOS: Build native library
      - name: Build Native Library (macOS)
        if: matrix.os == 'macos-latest'
        run: make universal
        working-directory: src/Hermes.Native.macOS

      # Linux: Install dependencies and build native library
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev cmake

      - name: Build Native Library (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ./build.sh
        working-directory: src/Hermes.Native.Linux

      - name: Restore
        run: dotnet restore

      - name: Build Sample App
        run: dotnet build samples/BlazorHelloWorld -c Release --no-restore

      - name: Run Smoke Test
        uses: ./.github/actions/smoke-test
        with:
          app_path: samples/BlazorHelloWorld/bin/Release/net10.0/${{ runner.os == 'Windows' && 'BlazorHelloWorld.exe' || 'BlazorHelloWorld' }}

  pack-and-publish:
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_preview == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Download platform-specific DLLs
      - name: Download Windows DLL
        uses: actions/download-artifact@v4
        with:
          name: dll-win-x64
          path: artifacts/dll-win-x64

      - name: Download Linux DLL
        uses: actions/download-artifact@v4
        with:
          name: dll-linux-x64
          path: artifacts/dll-linux-x64

      - name: Download macOS DLL
        uses: actions/download-artifact@v4
        with:
          name: dll-osx
          path: artifacts/dll-osx

      - name: Download Native Binary (macOS)
        uses: actions/download-artifact@v4
        with:
          name: native-osx
          path: artifacts/native

      - name: Download Native Binary (Linux)
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: artifacts/native

      - name: Download WebView2 Binaries (Windows)
        uses: actions/download-artifact@v4
        with:
          name: webview2-win-x64
          path: artifacts/webview2-win-x64

      - name: Restore
        run: dotnet restore

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.1.0-preview.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Hermes.Contracts
        run: dotnet build src/Hermes.Contracts/Hermes.Contracts.csproj -c Release --no-restore

      - name: Pack Hermes.Contracts
        run: |
          dotnet pack src/Hermes.Contracts/Hermes.Contracts.csproj \
            -c Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o packages

      - name: Build Hermes (for reference assembly)
        run: dotnet build src/Hermes/Hermes.csproj -c Release --no-restore

      - name: Pack Hermes
        run: |
          dotnet pack src/Hermes/Hermes.csproj \
            -c Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:IsPackaging=true \
            -p:CIArtifactsPath=${{ github.workspace }}/artifacts \
            -o packages

      - name: Build Hermes.Blazor
        run: dotnet build src/Hermes.Blazor/Hermes.Blazor.csproj -c Release --no-restore

      - name: Pack Hermes.Blazor
        run: |
          dotnet pack src/Hermes.Blazor/Hermes.Blazor.csproj \
            -c Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o packages

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: packages/*.nupkg
          retention-days: 14

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push packages/*.nupkg \
            --api-key ${{ secrets.NUGET_ORG_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github https://nuget.pkg.github.com/mythetech/index.json
          dotnet nuget push packages/*.nupkg --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
