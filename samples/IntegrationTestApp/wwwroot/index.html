<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes Integration Tests</title>
    <base href="/" />
    <style>
        :root {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            color-scheme: light dark;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        #app {
            height: 100%;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0078d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #e0e0e0;
            }
            .loading-spinner {
                border-color: #333;
                border-top-color: #0078d4;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading Hermes Integration Tests...</p>
        </div>
    </div>

    <script src="_framework/blazor.webview.js" autostart="true"></script>
    <script>
        // Integration test message handler
        // Listen for messages from C# and respond for round-trip testing
        (function() {
            if (window.external && window.external.receiveMessage) {
                window.external.receiveMessage(function(message) {
                    // Parse JSON message if it's a string
                    var msg = message;
                    if (typeof message === 'string') {
                        try {
                            // Message might be JSON-encoded string
                            msg = JSON.parse(message);
                        } catch (e) {
                            msg = message;
                        }
                    }

                    // If we receive "ping", respond with "pong"
                    if (msg === 'ping' || msg.type === 'ping') {
                        window.external.sendMessage(JSON.stringify({ type: 'pong', timestamp: Date.now() }));
                    }
                });

                // Signal that JS message handler is ready
                // This is important for Windows where WebView2 init is async
                window.external.sendMessage(JSON.stringify({ type: 'js-ready', timestamp: Date.now() }));
            }
        })();
    </script>
</body>
</html>
