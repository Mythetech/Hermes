<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes Blazor - Hello World</title>
    <base href="/" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100%;
            overflow: hidden;
        }

        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .loading {
            color: var(--text-muted);
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Title Bar - using HermesTitleBar component */
        .hermes-title-bar {
            background: var(--surface) !important;
            border-bottom: 1px solid var(--surface-hover);
            color: var(--text);
        }

        .title-bar-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 1rem;
            -webkit-app-region: no-drag;
        }

        .title-bar-brand {
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-bar-title {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Spacer for drag region */
        .title-bar-spacer {
            flex: 1;
            -webkit-app-region: drag;
            height: 100%;
            min-width: 40px;
        }

        /* Title bar actions (test buttons, etc.) */
        .title-bar-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-right: 0.5rem;
            -webkit-app-region: no-drag;
        }

        .action-btn {
            padding: 0.25rem 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: var(--primary-dark);
        }

        /* Override Hermes window button colors for dark theme */
        .hermes-window-btn {
            color: var(--text-muted);
        }

        .hermes-window-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        /* Layout */
        .layout {
            display: flex;
            flex: 1;
            margin-top: 38px;
            height: calc(100% - 38px);
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--surface-hover);
            flex-shrink: 0;
            overflow-y: auto;
        }

        .content {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }

        /* Navigation */
        .nav-menu {
            padding: 1rem 0;
        }

        .nav-brand {
            padding: 1rem 1.5rem;
            font-weight: 700;
            font-size: 1.125rem;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .nav-link {
            display: block;
            padding: 0.75rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }

        /* Buttons */
        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--surface-hover);
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
        }

        /* Counter */
        .counter-value {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .counter-value .count {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* JS Interop */
        .interop-section {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .interop-section h2 {
            margin-bottom: 1rem;
        }

        .instructions {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .instructions code {
            background: var(--bg);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .result {
            color: #10b981;
            font-weight: 500;
            margin-top: 1rem;
        }

        /* Metrics (Home page) */
        .metrics {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-top: 2rem;
            display: inline-block;
            text-align: left;
        }

        .metrics h2 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .metric-unit {
            color: var(--text-muted);
        }

        .metric-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <p class="loading">Loading...</p>
    </div>

    <script src="_framework/blazor.webview.js"></script>
</body>
</html>
